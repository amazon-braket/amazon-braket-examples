# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - feature/**


permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Check disk space
      run: df -h .
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      env:
        UV_SYSTEM_PYTHON: "true"
      run: |
        uv pip install hatch
    - name: Install BLAS/LAPACK libraries on Ubuntu
      if: ${{ runner.os == 'Linux' }}
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev liblapack-dev
    - name: Run integ tests
      env:
        HATCH_INSTALLER: uv
      run: |
        hatch run test -p no:cacheprovider
    - name: Run optional tests
      if: ${{ matrix.python-version != '3.10' && matrix.python-version != '3.13' }}
      env:
        HATCH_INSTALLER: uv
      run: |
        hatch run test-mitiq:test
