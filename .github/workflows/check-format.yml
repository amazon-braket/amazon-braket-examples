# This workflow will run the linter, formatter, and heading-style checks
# from a new hatch environment.


name: Check code format and style

on:
  pull_request:
    branches:
      - main
      - feature/**

permissions:
  contents: read

jobs:
  check-code-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: "3.x"
    - name: Install dependencies
      run: |
        pip install hatch "click<8.3.0"
    - name: Run lint and format checks
      run: |
        hatch run lint:style
    - name: Check notebook heading style
      run: |
        python test/repo_tests/test_heading_style.py examples
